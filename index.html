<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Terminal</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Helvetica,Arial;
  background:#0b0b10;
  color:white;
}

section{
  max-width:1200px;
  margin:auto;
  padding:70px 20px;
}

h2{
  font-size:34px;
  margin-bottom:20px;
}

.glow,.glow2{
  position:fixed;
  width:650px;
  height:650px;
  filter:blur(90px);
  z-index:-1;
}
.glow{
  top:-250px;left:-250px;
  background:radial-gradient(circle,rgba(0,200,255,.16),transparent 60%);
}
.glow2{
  right:-250px;bottom:-250px;
  background:radial-gradient(circle,rgba(255,0,150,.12),transparent 60%);
}

.block{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
  backdrop-filter:blur(18px);
}

.chart-box{
  overflow:hidden;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.1);
}

/* 下拉框 */
.buttons{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
  margin-bottom:22px;
}

.buttons select{
  appearance:none;
  background:
    linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,.04)),
    url("data:image/svg+xml,%3Csvg width='14' height='10' viewBox='0 0 14 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L7 7.5L13 1.5' stroke='white' stroke-width='2'/%3E%3C/svg%3E");
  background-repeat:no-repeat;
  background-position:right 14px center;
  padding:14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.15);
  color:white;
  cursor:pointer;
}

/* 新闻 */
.news-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.news-card{
  background:rgba(255,255,255,.06);
  border-radius:20px;
  overflow:hidden;
  transition:.25s;
}
.news-card:hover{
  transform:translateY(-5px);
}
.news-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.news-card h3{
  padding:14px;
  font-size:15px;
  margin:0;
}
.news-card a{color:white;text-decoration:none}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<!-- OVERVIEW -->
<section>
<h2>Market Overview</h2>

<div class="block">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
{"symbols":[{"proName":"AMEX:SPY"},{"proName":"NASDAQ:QQQ"},{"proName":"AMEX:IWM"},{"proName":"AMEX:VTI"}],"colorTheme":"dark"}
</script>
</div>

<div class="block">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
{"symbols":[{"proName":"NASDAQ:AAPL"},{"proName":"NASDAQ:MSFT"},{"proName":"NASDAQ:META"},{"proName":"NASDAQ:NVDA"},{"proName":"NASDAQ:TSLA"}],"colorTheme":"dark"}
</script>
</div>

<!-- WATCHLIST -->
<h2>My Watchlist</h2>
<div class="block">
<script src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
{"symbols":[
{"proName":"NYSE:CMG"},
{"proName":"NASDAQ:META"},
{"proName":"NYSE:BROS"},
{"proName":"NASDAQ:DKNG"},
{"proName":"OTC:LKNCY"},
{"proName":"NYSE:RDDT"}
],"colorTheme":"dark"}
</script>
</div>

</section>

<!-- CHART -->
<section>
<h2>Live Chart</h2>

<div class="buttons">
<select id="type" onchange="loadCat()"></select>
<select id="cat" onchange="loadSymbol()"></select>
<select id="sym" onchange="changeChart()"></select>
</div>

<div class="chart-box">
<iframe id="chart"
src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:AAPL&theme=dark"
width="100%" height="520"></iframe>
</div>

</section>

<!-- NEWS -->
<section>
<h2>Market News</h2>

<div class="news-grid">

<div class="news-card">
<a href="https://www.cnbc.com/quotes/NVDA" target="_blank">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
<h3>NVDA AI demand remains strong</h3>
</a>
</div>

<div class="news-card">
<a href="https://www.cnbc.com/quotes/META" target="_blank">
<img src="https://images.unsplash.com/photo-1611162618071-b39a2ec055fb">
<h3>META advertising growth outlook</h3>
</a>
</div>

<div class="news-card">
<a href="https://www.reuters.com/markets/" target="_blank">
<img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a">
<h3>Global markets update</h3>
</a>
</div>

</div>

</section>

<script>
const data={
ETF:{
Major:[["SPY","AMEX:SPY"],["QQQ","NASDAQ:QQQ"]],
Sector:[["XLK","AMEX:XLK"],["XLF","AMEX:XLF"]]
},
Stocks:{
Tech:[["AAPL","NASDAQ:AAPL"],["NVDA","NASDAQ:NVDA"],["META","NASDAQ:META"]],
Energy:[["XOM","NYSE:XOM"],["CVX","NYSE:CVX"]],
Finance:[["JPM","NYSE:JPM"],["BAC","NYSE:BAC"]]
}
};

function init(){
let t=document.getElementById("type");
Object.keys(data).forEach(k=>t.innerHTML+=`<option>${k}</option>`);
loadCat();
}

function loadCat(){
let t=document.getElementById("type").value;
let c=document.getElementById("cat");
c.innerHTML="";
Object.keys(data[t]).forEach(k=>c.innerHTML+=`<option>${k}</option>`);
loadSymbol();
}

function loadSymbol(){
let t=document.getElementById("type").value;
let c=document.getElementById("cat").value;
let s=document.getElementById("sym");
s.innerHTML="";
data[t][c].forEach(i=>s.innerHTML+=`<option value="${i[1]}">${i[0]}</option>`);
changeChart();
}

function changeChart(){
document.getElementById("chart").src=
"https://s.tradingview.com/widgetembed/?symbol="+document.getElementById("sym").value+"&theme=dark";
}

init();
</script>

</body>
</html>
