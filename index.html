<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quant Signal Desk</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Helvetica,Arial;
  background:#0b0b10;
  color:#fff;
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(10,10,15,.75);
  backdrop-filter:blur(18px);
  display:flex;
  justify-content:center;
  gap:24px;
  padding:14px 0;
  z-index:999;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.nav a{
  color:#aaa;
  text-decoration:none;
  font-size:13px;
}
.nav a:hover{color:white}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h1{font-size:64px;margin:0}
.hero p{color:#aaa;margin-top:10px}

/* SECTIONS */
section{
  max-width:1200px;
  margin:auto;
  padding:100px 20px;
}
h2{font-size:32px}

/* BLOCK */
.block{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:16px;
}

/* NEWS */
.news a{
  display:block;
  color:#9ad1ff;
  text-decoration:none;
  margin-bottom:10px;
  font-size:14px;
}
.news a:hover{text-decoration:underline}

/* GLOW */
.glow{
  position:fixed;
  width:650px;
  height:650px;
  top:-250px;
  left:-250px;
  background:radial-gradient(circle,rgba(0,200,255,.18),transparent 60%);
  filter:blur(90px);
  z-index:-1;
}
.glow2{
  position:fixed;
  width:650px;
  height:650px;
  right:-250px;
  bottom:-250px;
  background:radial-gradient(circle,rgba(255,0,150,.13),transparent 60%);
  filter:blur(90px);
  z-index:-1;
}
</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<!-- NAV -->
<div class="nav">
  <a href="#market">Market</a>
  <a href="#watch">Watchlist</a>
  <a href="#chart">Chart</a>
  <a href="#news">News</a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Quant Signal Desk</h1>
  <p>Real-time Market • No API • Stable Data</p>
</div>

<!-- MARKET (实时价格滚动) -->
<section id="market">
<h2>Market Overview</h2>

<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      {"proName":"AMEX:SPY","title":"SPY"},
      {"proName":"NASDAQ:QQQ","title":"QQQ"},
      {"proName":"NASDAQ:AAPL","title":"AAPL"},
      {"proName":"NASDAQ:MSFT","title":"MSFT"},
      {"proName":"NASDAQ:META","title":"META"},
      {"proName":"NASDAQ:NVDA","title":"NVDA"},
      {"proName":"NASDAQ:TSLA","title":"TSLA"},
      {"proName":"NASDAQ:AMZN","title":"AMZN"}
    ],
    "colorTheme": "dark",
    "isTransparent": true,
    "displayMode": "adaptive"
  }
  </script>
</div>

</section>

<!-- WATCHLIST -->
<section id="watch">
<h2>My Watchlist</h2>

<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
  {
    "symbols": [
      ["CMG"],
      ["META"],
      ["BROS"],
      ["DKNG"],
      ["OTC:LKNCY"],
      ["NYSE:RDDT"]
    ],
    "colorTheme": "dark",
    "width": "100%",
    "height": 400
  }
  </script>
</div>

</section>

<!-- CHART -->
<section id="chart">
<h2>Live Chart</h2>

<div class="tradingview-widget-container">
  <div id="tradingview_chart"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script>
    new TradingView.widget({
      "width": "100%",
      "height": 500,
      "symbol": "NASDAQ:AAPL",
      "interval": "D",
      "theme": "dark",
      "style": "1",
      "locale": "en"
    });
  </script>
</div>

</section>

<!-- NEWS -->
<section id="news">
<h2>Market News</h2>

<div class="block news">
  <a href="https://www.cnbc.com/quotes/NVDA" target="_blank">NVDA AI demand remains strong</a>
  <a href="https://www.cnbc.com/quotes/META" target="_blank">META advertising outlook improves</a>
  <a href="https://www.cnbc.com/quotes/SPY" target="_blank">SPY market trend analysis</a>
  <a href="https://www.reuters.com/markets/" target="_blank">Global markets update (Reuters)</a>
  <a href="https://finance.yahoo.com/quote/RDDT" target="_blank">RDDT latest updates</a>
</div>

</section>

</body>
</html>
