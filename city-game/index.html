<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endless Satellite City Guess</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <style>
    :root{
      --bg:#0d1118;
      --text:#f7f9fc;
      --subtext:#a9b4c8;
      --side:#141b26;
      --card:rgba(255,255,255,.055);
      --stat:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.1);
      --input-bg:#0b1018;
      --input-text:#ffffff;
      --button:#7aa2ff;
      --button-text:#06101f;
      --ghost:rgba(255,255,255,.08);
      --ghost-text:#f7f9fc;
      --suggest-bg:#0b1018;
      --result-bg:rgba(122,162,255,.12);
      --result-border:rgba(122,162,255,.28);
      --overlay-bg:rgba(8,12,18,.75);
      --loading-bg:#0d1118;
      --shadow:rgba(0,0,0,.35);
      --map-bg:#070a0f;
    }

    body.light{
      --bg:#f5f5f7;
      --text:#111111;
      --subtext:#666b76;
      --side:#ffffff;
      --card:rgba(0,0,0,.035);
      --stat:rgba(0,0,0,.045);
      --border:rgba(0,0,0,.12);
      --input-bg:#f2f2f7;
      --input-text:#111111;
      --button:#111111;
      --button-text:#ffffff;
      --ghost:rgba(0,0,0,.055);
      --ghost-text:#111111;
      --suggest-bg:#ffffff;
      --result-bg:rgba(0,122,255,.08);
      --result-border:rgba(0,122,255,.22);
      --overlay-bg:rgba(255,255,255,.78);
      --loading-bg:#f5f5f7;
      --shadow:rgba(0,0,0,.16);
      --map-bg:#e5e5ea;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow:hidden;
      transition:background .25s ease,color .25s ease;
    }

    button,input,select{
      font:inherit;
    }

    button{
      border:0;
      border-radius:14px;
      padding:12px 15px;
      font-weight:800;
      cursor:pointer;
      background:var(--button);
      color:var(--button-text);
      transition:.2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    button.ghost{
      background:var(--ghost);
      color:var(--ghost-text);
      border:1px solid var(--border);
    }

    button:disabled{
      opacity:.5;
      cursor:not-allowed;
      transform:none;
    }

    input,select{
      width:100%;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--input-bg);
      color:var(--input-text);
      padding:12px 13px;
      outline:none;
      transition:.2s ease;
    }

    input::placeholder{
      color:var(--subtext);
    }

    input:focus,select:focus{
      border-color:#7aa2ff;
      box-shadow:0 0 0 4px rgba(122,162,255,.16);
    }

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:390px 1fr;
    }

    .side{
      background:var(--side);
      border-right:1px solid var(--border);
      padding:18px;
      overflow:auto;
      transition:background .25s ease,border-color .25s ease;
    }

    .map{
      min-width:0;
      position:relative;
    }

    #map{
      height:100%;
      width:100%;
      background:var(--map-bg);
    }

    .brand{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .brand-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .language-select{
      width:auto;
      min-width:112px;
      padding:12px 34px 12px 13px;
      border-radius:14px;
    }

    .brand h1{
      font-size:22px;
      letter-spacing:-.04em;
      margin:0;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:15px;
      margin-bottom:13px;
      box-shadow:0 20px 60px var(--shadow);
      transition:background .25s ease,border-color .25s ease,box-shadow .25s ease;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .row{
      display:flex;
      gap:10px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:12px;
    }

    .stat{
      background:var(--stat);
      border-radius:16px;
      padding:12px;
      text-align:center;
      transition:background .25s ease;
    }

    .stat b{
      display:block;
      font-size:18px;
    }

    .stat span{
      display:block;
      color:var(--subtext);
      font-size:12px;
      margin-top:2px;
    }

    .muted{
      color:var(--subtext);
      font-size:13px;
      line-height:1.55;
    }

    .suggestions{
      position:relative;
    }

    .suggestBox{
      position:absolute;
      z-index:1000;
      left:0;
      right:0;
      top:50px;
      background:var(--suggest-bg);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 18px 50px var(--shadow);
      display:none;
    }

    .suggestion{
      padding:11px 13px;
      border-bottom:1px solid var(--border);
      cursor:pointer;
      color:var(--text);
    }

    .suggestion:hover{
      background:rgba(122,162,255,.16);
    }

    .suggestion small{
      color:var(--subtext);
    }

    .history{
      display:grid;
      gap:8px;
      margin-top:12px;
    }

    .guess{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      background:var(--card);
      font-size:14px;
    }

    .tag{
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      background:var(--ghost);
    }

    .tag.ok{
      color:#19a75d;
      background:rgba(93,235,153,.18);
    }

    .tag.bad{
      color:#c27803;
      background:rgba(255,185,86,.18);
    }

    body:not(.light) .tag.ok{
      color:#7df5ad;
    }

    body:not(.light) .tag.bad{
      color:#ffd18c;
    }

    .result{
      display:none;
      border-color:var(--result-border);
      background:var(--result-bg);
      line-height:1.55;
    }

    .topOverlay{
      position:absolute;
      top:16px;
      left:16px;
      right:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      pointer-events:none;
    }

    .pill{
      pointer-events:auto;
      backdrop-filter:blur(14px);
      background:var(--overlay-bg);
      border:1px solid var(--border);
      border-radius:999px;
      padding:9px 12px;
      color:var(--text);
      font-size:13px;
      box-shadow:0 12px 30px var(--shadow);
    }

    .loading{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      background:var(--loading-bg);
      z-index:9999;
      transition:background .25s ease;
    }

    .loadingCard{
      max-width:420px;
      background:var(--side);
      border:1px solid var(--border);
      border-radius:24px;
      padding:22px;
      box-shadow:0 20px 80px var(--shadow);
    }

    .progress{
      height:8px;
      border-radius:999px;
      background:var(--ghost);
      overflow:hidden;
      margin-top:14px;
    }

    .bar{
      height:100%;
      width:20%;
      background:#7aa2ff;
      border-radius:999px;
      animation:load 1.2s infinite alternate;
    }

    body.light .leaflet-control-zoom a{
      background:#ffffff;
      color:#111111;
      border-color:rgba(0,0,0,.14);
    }

    body.light .leaflet-control-attribution{
      background:rgba(255,255,255,.76);
      color:#111;
    }

    body.light .leaflet-control-attribution a{
      color:#0059ff;
    }

    @keyframes load{
      to{
        width:95%;
      }
    }

    @media(max-width:860px){
      body{
        overflow:auto;
      }

      .app{
        height:auto;
        min-height:100vh;
        grid-template-columns:1fr;
      }

      .side{
        border-right:0;
        border-bottom:1px solid var(--border);
      }

      .map{
        height:56vh;
      }

      .brand{
        flex-direction:column;
      }

      .topOverlay{
        top:10px;
        left:10px;
        right:10px;
      }

      .pill{
        font-size:12px;
      }
    }
  </style>
</head>

<body>
  <div class="loading" id="loading">
    <div class="loadingCard">
      <h2 style="margin:0 0 8px" data-i18n="loadingTitle">Loading city database</h2>
      <div class="muted" id="loadingText" data-i18n="loadingText">Loading cities.json from the site folder. If it is missing, a small fallback city set will be used.</div>
      <div class="progress"><div class="bar"></div></div>
    </div>
  </div>

  <div class="app">
    <aside class="side">
      <div class="brand">
        <div>
          <h1>Endless Satellite City Guess</h1>
        </div>

        <div class="brand-actions">
          <select id="languageSelect" class="language-select">
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>

          <button class="ghost" id="nextBtn" data-i18n="next">Next</button>
        </div>
      </div>

      <div class="card">
        <div>
          <label>
            <div class="muted" data-i18n="difficulty">Difficulty</div>
            <select id="difficulty">
              <option value="easy" data-i18n="easy">Easy</option>
              <option value="medium" selected data-i18n="medium">Medium</option>
              <option value="hard" data-i18n="hard">Hard</option>
              <option value="all" data-i18n="all">All</option>
            </select>
          </label>
        </div>

        <div class="stats">
          <div class="stat">
            <b id="attemptText">1/6</b>
            <span data-i18n="attempts">Attempts</span>
          </div>

          <div class="stat">
            <b id="zoomText">16</b>
            <span>Zoom</span>
          </div>

          <div class="stat">
            <b id="poolText">0</b>
            <span data-i18n="pool">Pool</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="suggestions">
          <div class="row">
            <input id="guessInput" placeholder="Enter a city, e.g. Tokyo / Shanghai / NYC" autocomplete="off" />
            <button id="guessBtn" data-i18n="guess">Guess</button>
          </div>

          <div class="suggestBox" id="suggestBox"></div>
        </div>

        <div class="muted" id="hintText" style="display:none"></div>
        <div class="history" id="history"></div>
      </div>

      <div class="card result" id="result"></div>

      <div class="card">
        <div class="grid">
          <div class="stat">
            <b id="playedText">0</b>
            <span data-i18n="played">Played</span>
          </div>

          <div class="stat">
            <b id="winText">0%</b>
            <span data-i18n="winRate">Win Rate</span>
          </div>
        </div>

        <button class="ghost" id="resetBtn" style="width:100%" data-i18n="resetStats">Reset Local Stats</button>
      </div>
    </aside>

    <main class="map">
      <div id="map"></div>

      <div class="topOverlay">
        <div class="pill" id="roundPill">Round 1</div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <script>
    function setCityTheme(theme){
      if(theme === "light"){
        document.body.classList.add("light");
      }else{
        document.body.classList.remove("light");
      }

      localStorage.setItem("siteTheme", theme);
    }

    const cityThemeParams = new URLSearchParams(window.location.search);
    const initialCityTheme =
      cityThemeParams.get("theme") ||
      localStorage.getItem("siteTheme") ||
      "dark";

    setCityTheme(initialCityTheme);

    window.addEventListener("message", function(event){
      if(event.data && event.data.type === "site-theme"){
        setCityTheme(event.data.theme);
      }
    });

    const FALLBACK_CITIES = [
      {id:1,name:"New York",asciiName:"New York",countryCode:"US",countryName:"United States",lat:40.7128,lng:-74.006,population:8804190,featureCode:"PPL",aliases:["new york","new york city","nyc","纽约"]},
      {id:2,name:"Los Angeles",asciiName:"Los Angeles",countryCode:"US",countryName:"United States",lat:34.0522,lng:-118.2437,population:3898747,featureCode:"PPL",aliases:["los angeles","la","洛杉矶"]},
      {id:3,name:"San Francisco",asciiName:"San Francisco",countryCode:"US",countryName:"United States",lat:37.7749,lng:-122.4194,population:873965,featureCode:"PPL",aliases:["san francisco","sf","旧金山"]},
      {id:4,name:"Tokyo",asciiName:"Tokyo",countryCode:"JP",countryName:"Japan",lat:35.6762,lng:139.6503,population:13960000,featureCode:"PPLC",aliases:["tokyo","tokio","東京","东京"]},
      {id:5,name:"Shanghai",asciiName:"Shanghai",countryCode:"CN",countryName:"China",lat:31.2304,lng:121.4737,population:24870000,featureCode:"PPL",aliases:["shanghai","上海"]},
      {id:6,name:"London",asciiName:"London",countryCode:"GB",countryName:"United Kingdom",lat:51.5072,lng:-0.1276,population:8799800,featureCode:"PPLC",aliases:["london","伦敦"]},
      {id:7,name:"Paris",asciiName:"Paris",countryCode:"FR",countryName:"France",lat:48.8566,lng:2.3522,population:2161000,featureCode:"PPLC",aliases:["paris","巴黎"]},
      {id:8,name:"Dubai",asciiName:"Dubai",countryCode:"AE",countryName:"United Arab Emirates",lat:25.2048,lng:55.2708,population:3331000,featureCode:"PPLA",aliases:["dubai","迪拜"]},
      {id:9,name:"Singapore",asciiName:"Singapore",countryCode:"SG",countryName:"Singapore",lat:1.3521,lng:103.8198,population:5637000,featureCode:"PPLC",aliases:["singapore","新加坡"]},
      {id:10,name:"Sydney",asciiName:"Sydney",countryCode:"AU",countryName:"Australia",lat:-33.8688,lng:151.2093,population:5312000,featureCode:"PPLA",aliases:["sydney","悉尼"]}
    ];

    const STAGES = [
      {minZoom:15,maxZoom:18},
      {minZoom:14,maxZoom:18},
      {minZoom:13,maxZoom:18},
      {minZoom:12,maxZoom:18},
      {minZoom:10,maxZoom:18},
      {minZoom:8,maxZoom:18}
    ];

    const MAX_ATTEMPTS = STAGES.length;
    let cities = [];
    let cityById = new Map();
    let aliasRows = [];
    let map;
    let answer;
    let attempt = 0;
    let round = 1;
    let gameOver = false;
    let marker = null;
    let allowedBounds = null;
    let isClamping = false;

    const $ = id => document.getElementById(id);

    const I18N = {
      en: {
        loadingTitle: "Loading city database",
        loadingText: "Loading cities.json from the site folder. If it is missing, a small fallback city set will be used.",
        loadedCities: count => `Loaded ${count.toLocaleString()} cities.`,
        fallbackCities: "cities.json was not found in the site folder. Using the small fallback city set.",
        next: "Next",
        difficulty: "Difficulty",
        easy: "Easy",
        medium: "Medium",
        hard: "Hard",
        all: "All",
        attempts: "Attempts",
        pool: "Pool",
        guess: "Guess",
        inputPlaceholder: "Enter a city, e.g. Tokyo / Shanghai / NYC",
        played: "Played",
        winRate: "Win Rate",
        resetStats: "Reset Local Stats",
        correct: "Correct",
        notFound: "Not found",
        correctTitle: "Correct!",
        outOfGuesses: "Out of guesses",
        answer: "Answer",
        population: "Population",
        nextRound: "Next Round"
      },
      zh: {
        loadingTitle: "正在加载城市库",
        loadingText: "正在读取网站目录里的 cities.json。如果没有，会临时使用内置小题库。",
        loadedCities: count => `已加载 ${count.toLocaleString()} 个城市。`,
        fallbackCities: "没有找到网站目录里的 cities.json，正在使用内置小题库。",
        next: "下一题",
        difficulty: "难度",
        easy: "Easy 简单",
        medium: "Medium 中等",
        hard: "Hard 困难",
        all: "All 全部",
        attempts: "次数",
        pool: "题库",
        guess: "猜",
        inputPlaceholder: "输入城市名，如 Tokyo / 上海 / NYC",
        played: "已玩",
        winRate: "胜率",
        resetStats: "重置本地记录",
        correct: "正确",
        notFound: "未收录",
        correctTitle: "答对了！",
        outOfGuesses: "没猜出来",
        answer: "答案",
        population: "人口",
        nextRound: "继续下一题"
      }
    };

    let currentLang = localStorage.getItem("zcg_lang") || "en";
    const tr = key => I18N[currentLang][key] ?? I18N.en[key] ?? key;

    function applyLanguage() {
      const select = $("languageSelect");
      if (select) select.value = currentLang;
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        const value = tr(key);
        if (typeof value === "string") el.textContent = value;
      });
      const input = $("guessInput");
      if (input) input.placeholder = tr("inputPlaceholder");
    }

    function setLanguage(lang) {
      currentLang = I18N[lang] ? lang : "en";
      localStorage.setItem("zcg_lang", currentLang);
      applyLanguage();
      updateUI();
    }

    const normalize = s => String(s || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .replace(/[^\p{Letter}\p{Number}\s]/gu, " ")
      .replace(/\s+/g, " ")
      .trim();

    const CITY_POPULATION_OVERRIDES = {
      "sydney|AU": 5312000,
      "melbourne|AU": 5078000,
      "brisbane|AU": 2560000,
      "perth|AU": 2192000,
      "adelaide|AU": 1402000,
      "gold coast|AU": 735000,
      "san francisco|US": 4623000,
      "boston|US": 4941000,
      "washington|US": 6385000,
      "miami|US": 6139000,
      "atlanta|US": 6307000,
      "seattle|US": 4034000,
      "denver|US": 3005000,
      "las vegas|US": 2265000,
      "vancouver|CA": 2643000,
      "toronto|CA": 6202000,
      "montreal|CA": 4291000,
      "manchester|GB": 2730000,
      "birmingham|GB": 2920000,
      "leeds|GB": 1901000,
      "glasgow|GB": 1680000
    };

    function populationValue(city) {
      return Number(city.gamePopulation ?? city.population ?? 0);
    }

    function cityPopulationForGame(city) {
      const key = `${normalize(city.name)}|${String(city.countryCode || "").toUpperCase()}`;
      return CITY_POPULATION_OVERRIDES[key] ?? Number(city.population ?? 0);
    }

    function runTests() {
      console.assert(normalize("São   Paulo!") === "sao paulo", "normalize should remove accents and punctuation");
      console.assert(cityPopulationForGame({name:"Sydney",countryCode:"AU",population:250000}) === 5312000, "Sydney should use override population");
      console.assert(populationValue({gamePopulation:0,population:123}) === 0, "populationValue should preserve 0 gamePopulation");
      console.assert(populationValue({population:123}) === 123, "populationValue should fall back to raw population");
      const testEasy = {gamePopulation:750000};
      const testMedium = {gamePopulation:250000};
      const testHard = {gamePopulation:249999};
      console.assert(populationValue(testEasy) >= 750000, "Easy boundary should include 750,000");
      console.assert(populationValue(testMedium) >= 250000 && populationValue(testMedium) < 750000, "Medium boundary should include 250,000");
      console.assert(populationValue(testHard) < 250000, "Hard boundary should be below 250,000");
    }

    const km = (a, b) => {
      const R = 6371;
      const toRad = x => x * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const x = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    };

    const currentStage = () => STAGES[Math.min(attempt, STAGES.length - 1)];

    function getLegalCenterPixelBounds() {
      if (!allowedBounds) return null;
      const z = map.getZoom();
      const nw = map.project(allowedBounds.getNorthWest(), z);
      const se = map.project(allowedBounds.getSouthEast(), z);
      const half = map.getSize().divideBy(2);
      return {
        minX: nw.x + half.x,
        maxX: se.x - half.x,
        minY: nw.y + half.y,
        maxY: se.y - half.y,
        nw,
        se
      };
    }

    function clampCenterToAllowed(animate = false) {
      if (isClamping || gameOver || !allowedBounds) return;
      const b = getLegalCenterPixelBounds();
      if (!b) return;

      const z = map.getZoom();
      const p = map.project(map.getCenter(), z);
      let x = p.x;
      let y = p.y;

      if (b.minX > b.maxX) x = (b.nw.x + b.se.x) / 2;
      else x = Math.min(Math.max(x, b.minX), b.maxX);

      if (b.minY > b.maxY) y = (b.nw.y + b.se.y) / 2;
      else y = Math.min(Math.max(y, b.minY), b.maxY);

      if (Math.abs(x - p.x) > 0.5 || Math.abs(y - p.y) > 0.5) {
        isClamping = true;
        map.setView(map.unproject([x, y], z), z, {animate});
        isClamping = false;
      }
    }

    function syncDragging() {
      if (!map || !map.dragging) return;
      if (gameOver || !allowedBounds) {
        map.dragging.enable();
        return;
      }
      const stage = currentStage();
      if (map.getZoom() <= stage.minZoom + 0.01) map.dragging.disable();
      else map.dragging.enable();
    }

    function applyViewLimits() {
      const stage = currentStage();
      allowedBounds = null;
      map.setMaxBounds(null);
      map.setMinZoom(stage.minZoom);
      map.setMaxZoom(stage.maxZoom);
      map.setView([answer.lat, answer.lng], stage.minZoom, {animate:false});

      requestAnimationFrame(() => {
        allowedBounds = map.getBounds();
        syncDragging();
      });
    }

    const stats = () => JSON.parse(localStorage.getItem("zcg_stats") || "{\"played\":0,\"won\":0}");
    const saveStats = s => localStorage.setItem("zcg_stats", JSON.stringify(s));
    const usedKey = () => `zcg_used_${$("difficulty").value}`;
    const getUsed = () => new Set(JSON.parse(localStorage.getItem(usedKey()) || "[]"));
    const saveUsed = s => localStorage.setItem(usedKey(), JSON.stringify([...s].slice(-50000)));

    function isRealCity(city) {
      const code = String(city.featureCode || "").toUpperCase();
      const validCodes = new Set(["PPL", "PPLA", "PPLA2", "PPLA3", "PPLA4", "PPLC"]);
      return validCodes.has(code) && Number(city.population ?? 0) > 0;
    }

    function prepare(raw) {
      cities = raw
        .map((city, i) => {
          const aliases = new Set([city.name, city.asciiName, ...(city.aliases || [])]);
          const base = {
            ...city,
            id: city.id ?? i + 1,
            lat: Number(city.lat),
            lng: Number(city.lng),
            population: Number(city.population ?? 0),
            aliases: [...aliases].map(normalize).filter(Boolean)
          };
          return {
            ...base,
            gamePopulation: cityPopulationForGame(base)
          };
        })
        .filter(city => Number.isFinite(city.lat) && Number.isFinite(city.lng) && city.name && isRealCity(city));

      cityById = new Map(cities.map(city => [city.id, city]));
      aliasRows = [];
      for (const city of cities) {
        for (const alias of city.aliases) aliasRows.push({alias, city});
      }
      $("poolText").textContent = cities.length.toLocaleString();
    }

    async function loadCities() {
      try {
        const response = await fetch("./cities.json", {cache:"no-store"});
        if (!response.ok) throw new Error("no cities.json");
        const data = await response.json();
        prepare(data);
        $("loadingText").textContent = I18N[currentLang].loadedCities(cities.length);
        setTimeout(() => $("loading").style.display = "none", 250);
      } catch (error) {
        prepare(FALLBACK_CITIES);
        $("loadingText").textContent = tr("fallbackCities");
        setTimeout(() => $("loading").style.display = "none", 700);
      }
    }

    function pool() {
      const difficulty = $("difficulty").value;
      let selected = cities;

      if (difficulty === "easy") selected = cities.filter(city => populationValue(city) >= 750000);
      if (difficulty === "medium") selected = cities.filter(city => populationValue(city) >= 250000 && populationValue(city) < 750000);
      if (difficulty === "hard") selected = cities.filter(city => populationValue(city) > 0 && populationValue(city) < 250000);

      return selected.length ? selected : cities;
    }

    function chooseCity() {
      const currentPool = pool();
      const used = getUsed();
      let available = currentPool.filter(city => !used.has(city.id));
      if (!available.length) {
        used.clear();
        saveUsed(used);
        available = currentPool;
      }
      return available[Math.floor(Math.random() * available.length)];
    }

    function setupMap() {
      map = L.map("map", {
        zoomControl:true,
        dragging:true,
        scrollWheelZoom:true,
        doubleClickZoom:true,
        boxZoom:false,
        keyboard:true,
        tap:true,
        attributionControl:true,
        zoomSnap:1,
        inertia:false
      });

      L.tileLayer("https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        maxZoom:19,
        attribution:"Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community"
      }).addTo(map);

      map.on("drag", () => clampCenterToAllowed(false));
      map.on("dragend", () => clampCenterToAllowed(false));
      map.on("zoomend resize", () => {
        clampCenterToAllowed(false);
        syncDragging();
      });
    }

    function startRound() {
      answer = chooseCity();
      attempt = 0;
      gameOver = false;
      $("guessInput").value = "";
      $("history").innerHTML = "";
      $("result").style.display = "none";
      $("guessBtn").disabled = false;
      if (marker) {
        map.removeLayer(marker);
        marker = null;
      }
      applyViewLimits();
      $("roundPill").textContent = `Round ${round}`;
      updateUI();
    }

    function updateUI() {
      $("attemptText").textContent = `${Math.min(attempt + 1, MAX_ATTEMPTS)}/${MAX_ATTEMPTS}`;
      const stage = currentStage();
      $("zoomText").textContent = `${stage.minZoom}+`;
      const s = stats();
      $("playedText").textContent = s.played;
      $("winText").textContent = s.played ? `${Math.round(s.won / s.played * 100)}%` : "0%";
      $("hintText").textContent = "";
    }

    function findExact(query) {
      const normalized = normalize(query);
      if (!normalized) return null;
      const hit = aliasRows.find(row => row.alias === normalized);
      return hit ? hit.city : null;
    }

    function suggest(query) {
      const normalized = normalize(query);
      const box = $("suggestBox");
      box.innerHTML = "";
      if (normalized.length < 2) {
        box.style.display = "none";
        return;
      }

      const scored = [];
      const seen = new Set();
      for (const row of aliasRows) {
        if (seen.has(row.city.id)) continue;
        let score = 0;
        if (row.alias.startsWith(normalized)) score = 3;
        else if (row.alias.includes(normalized)) score = 2;
        else continue;
        score += Math.min(Math.log10(populationValue(row.city) + 1) / 10, 1);
        scored.push({score, city:row.city});
        seen.add(row.city.id);
        if (scored.length > 350) break;
      }

      scored
        .sort((a, b) => b.score - a.score)
        .slice(0, 12)
        .forEach(({city}) => {
          const div = document.createElement("div");
          div.className = "suggestion";
          div.innerHTML = `${city.name} <small>${city.countryName || city.countryCode} · ${populationValue(city).toLocaleString()}</small>`;
          div.onclick = () => {
            $("guessInput").value = city.name;
            box.style.display = "none";
            $("guessInput").focus();
          };
          box.appendChild(div);
        });

      box.style.display = box.children.length ? "block" : "none";
    }

    function addGuess(text, correct, distance) {
      const div = document.createElement("div");
      div.className = "guess";
      const label = correct ? tr("correct") : distance == null ? tr("notFound") : Math.round(distance).toLocaleString() + " km";
      div.innerHTML = `<span>${text}</span><span class="tag ${correct ? "ok" : "bad"}">${label}</span>`;
      $("history").prepend(div);
    }

    function endRound(won) {
      gameOver = true;
      $("guessBtn").disabled = true;

      const used = getUsed();
      used.add(answer.id);
      saveUsed(used);

      const s = stats();
      s.played++;
      if (won) s.won++;
      saveStats(s);

      allowedBounds = null;
      map.dragging.enable();
      map.setMinZoom(3);
      map.setMaxZoom(18);
      map.setMaxBounds(null);
      map.setView([answer.lat, answer.lng], 11);
      marker = L.marker([answer.lat, answer.lng]).addTo(map).bindPopup(`${answer.name}${answer.countryName ? ", " + answer.countryName : ""}`).openPopup();

      $("result").innerHTML = `<b>${won ? tr("correctTitle") : tr("outOfGuesses")}</b><br>${tr("answer")}: ${answer.name}${answer.countryName ? ", " + answer.countryName : ""}<br>${tr("population")}: ${populationValue(answer).toLocaleString()}<br><br><button id="continueBtn">${tr("nextRound")}</button>`;
      $("result").style.display = "block";
      $("continueBtn").onclick = () => {
        round++;
        startRound();
      };
      updateUI();
    }

    function submit() {
      if (gameOver) return;
      const raw = $("guessInput").value.trim();
      if (!raw) return;

      const guessed = findExact(raw);
      const correct = Boolean(guessed) && guessed.id === answer.id;
      const distance = guessed ? km(guessed, answer) : null;
      addGuess(raw, correct, distance);

      if (correct) {
        endRound(true);
        return;
      }

      attempt++;
      if (attempt >= MAX_ATTEMPTS) {
        endRound(false);
        return;
      }

      applyViewLimits();
      $("guessInput").value = "";
      $("suggestBox").style.display = "none";
      updateUI();
    }

    $("guessBtn").onclick = submit;

    $("nextBtn").onclick = () => {
      round++;
      startRound();
    };

    $("guessInput").addEventListener("keydown", event => {
      if (event.key === "Enter") submit();
      if (event.key === "Escape") $("suggestBox").style.display = "none";
    });

    $("guessInput").addEventListener("input", event => suggest(event.target.value));

    $("difficulty").onchange = () => {
      round = 1;
      startRound();
    };

    $("languageSelect").onchange = event => setLanguage(event.target.value);

    $("resetBtn").onclick = () => {
      localStorage.removeItem("zcg_stats");
      localStorage.removeItem(usedKey());
      updateUI();
    };

    document.addEventListener("click", event => {
      if (!event.target.closest(".suggestions")) $("suggestBox").style.display = "none";
    });

    (async () => {
      runTests();
      applyLanguage();
      setupMap();
      await loadCities();
      startRound();
    })();
  </script>
</body>
</html>
